<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Agendador de Notificações</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9;
            padding: 20px 16px 40px;
            color: #0f172a;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header p {
            font-size: 0.85rem;
            color: #475569;
            margin-top: 6px;
        }

        /* Card de criação */
        .card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #334155;
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            background: #ffffff;
            transition: 0.2s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Data/hora local */
        .datetime-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .datetime-row .form-group {
            flex: 1;
            min-width: 120px;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.97);
            background: #2563eb;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
            box-shadow: none;
            margin-top: 8px;
        }

        .btn-secondary:active {
            background: #e2e8f0;
        }

        /* Lista de notificações */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .section-title h2 {
            font-size: 1.35rem;
            font-weight: 600;
        }

        .badge-count {
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .notif-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .notif-item {
            background: white;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #eef2ff;
            transition: 0.1s;
            position: relative;
        }

        .notif-item.expired {
            opacity: 0.6;
            background: #f8fafc;
            border-left: 4px solid #94a3b8;
        }

        .notif-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notif-msg {
            font-size: 0.9rem;
            color: #334155;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .notif-time {
            font-size: 0.7rem;
            font-family: monospace;
            background: #f1f5f9;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            color: #475569;
        }

        .notif-status {
            font-size: 0.7rem;
            margin-left: 8px;
            color: #ef4444;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #94a3b8;
            padding: 6px;
            width: auto;
            box-shadow: none;
            border-radius: 40px;
        }

        .delete-btn:active {
            color: #ef4444;
            transform: scale(0.95);
            background: none;
        }

        .empty-state {
            text-align: center;
            padding: 32px 20px;
            background: #ffffffcc;
            border-radius: 32px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .toast-message {
            position: fixed;
            bottom: 24px;
            left: 16px;
            right: 16px;
            background: #1e293be6;
            backdrop-filter: blur(8px);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1000;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px 12px 30px;
            }
            .card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔔 NotificaMais</h1>
        <p>Agende lembretes e receba no horário exato</p>
    </div>

    <!-- Formulário de criação -->
    <div class="card">
        <div class="form-group">
            <label>Título da notificação</label>
            <input type="text" id="notifTitle" placeholder="Ex: Reunião importante" maxlength="50">
        </div>
        <div class="form-group">
            <label>Mensagem</label>
            <textarea id="notifMsg" placeholder="Descreva o lembrete..."></textarea>
        </div>
        <div class="datetime-row">
            <div class="form-group">
                <label>📅 Data</label>
                <input type="date" id="notifDate">
            </div>
            <div class="form-group">
                <label>⏰ Hora</label>
                <input type="time" id="notifTime">
            </div>
        </div>
        <button id="scheduleBtn">➕ Programar notificação</button>
        <button id="testPermissionBtn" class="btn-secondary">🔔 Permitir notificações</button>
    </div>

    <!-- Lista de notificações agendadas -->
    <div class="section-title">
        <h2>📋 Lembretes ativos</h2>
        <span class="badge-count" id="counterBadge">0</span>
    </div>
    <div id="notificationsList" class="notif-list">
        <div class="empty-state">✨ Nenhum lembrete programado.<br>Crie um acima!</div>
    </div>
</div>
<div id="toastMsg" class="toast-message"></div>

<script>
    // ---------- PERMISSÃO E SUPORTE ----------
    const isBrowserSupported = () => {
        return 'Notification' in window && 'serviceWorker' in navigator && 'PushManager' in window;
    };

    // Como não estamos usando service worker real para push (apenas notificações agendadas com timeout/local),
    // usamos Notification API + verificação de permissão + timeouts e intervalos.
    // Mas para agendamentos futuros mesmo com app fechado? Infelizmente web precisa estar aberta.
    // Para uma PWA, poderiamos usar Background Sync, mas neste exemplo usamos verificação periódica
    // com "requestIdleCallback" e salvamos no localStorage. Quando o usuário reabrir o app ou estiver ativo,
    // as notificações serão disparadas na hora certa (se o navegador estiver aberto).
    // Estratégia: salvar lista + checar a cada minuto se alguma notificação atingiu o horário.
    
    let scheduledNotifications = []; // { id, title, message, timestamp, triggered }
    let intervalChecker = null;
    let permissionGranted = false;

    // Elementos
    const titleInput = document.getElementById('notifTitle');
    const msgInput = document.getElementById('notifMsg');
    const dateInput = document.getElementById('notifDate');
    const timeInput = document.getElementById('notifTime');
    const scheduleBtn = document.getElementById('scheduleBtn');
    const testPermBtn = document.getElementById('testPermissionBtn');
    const notifListDiv = document.getElementById('notificationsList');
    const counterBadge = document.getElementById('counterBadge');
    const toastEl = document.getElementById('toastMsg');

    // Utilitários
    function showToast(msg, duration = 2500) {
        toastEl.textContent = msg;
        toastEl.style.opacity = '1';
        setTimeout(() => {
            toastEl.style.opacity = '0';
        }, duration);
    }

    // Salvar no localStorage
    function saveToLocalStorage() {
        const toStore = scheduledNotifications.map(n => ({
            id: n.id,
            title: n.title,
            message: n.message,
            timestamp: n.timestamp,
            triggered: n.triggered
        }));
        localStorage.setItem('scheduledNotifs', JSON.stringify(toStore));
    }

    // Carregar do localStorage
    function loadFromLocalStorage() {
        const stored = localStorage.getItem('scheduledNotifs');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                scheduledNotifications = parsed.map(p => ({
                    ...p,
                    triggered: p.triggered || false
                }));
            } catch(e) { console.warn(e); }
        }
        // limpar notificações já vencidas (timestamp passado e já triggered? Mas se não triggered, verificaremos depois)
        renderNotifications();
        updateCounter();
    }

    // Verificar permissão atual
    function updatePermissionStatus() {
        if (!isBrowserSupported()) {
            permissionGranted = false;
            return false;
        }
        if (Notification.permission === 'granted') {
            permissionGranted = true;
            return true;
        } else if (Notification.permission === 'denied') {
            permissionGranted = false;
            return false;
        } else {
            permissionGranted = false;
            return false;
        }
    }

    // Solicitar permissão
    async function rKaNCgLvMEXxNzMxj2F7FYi1AdRrTo6Nhu() {
        if (!isBrowserSupported()) {
            showToast("❌ Seu navegador não suporta notificações web.");
            return false;
        }
        if (Notification.permission === 'granted') {
            showToast("✅ Permissão já concedida!");
            permissionGranted = true;
            return true;
        }
        if (Notification.permission === 'denied') {
            showToast("🚫 Permissão negada. Altere nas configurações do site.");
            return false;
        }
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            permissionGranted = true;
            showToast("🔔 Notificações ativadas! Agora você receberá os lembretes.");
            return true;
        } else {
            permissionGranted = false;
            showToast("Sem permissão, você não receberá alertas.");
            return false;
        }
    }

    // Disparar notificação imediatamente
    function fireNotification(title, message, notifId) {
        if (!permissionGranted && Notification.permission === 'granted') {
            permissionGranted = true;
        }
        if (!permissionGranted) {
            // tenta mostrar alerta alternativo
            showToast(`⚠️ [${title}] ${message} (permissão negada)`, 4000);
            return false;
        }
        try {
            const notification = new Notification(title, {
                body: message,
                icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233b82f6"%3E%3Cpath d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.93 6 11v5l-2 2v1h16v-1l-2-2z"/%3E%3C/svg%3E',
                silent: false,
                vibrate: [200, 100, 200]
            });
            notification.onclick = function() {
                window.focus();
                notification.close();
            };
            setTimeout(() => notification.close(), 8000);
            return true;
        } catch(e) {
            console.warn(e);
            showToast(`🔔 ${title}: ${message}`, 3000);
            return false;
        }
    }

    // Verificar agendamentos pendentes e disparar se horário atingido
    function checkPendingNotifications() {
        if (!updatePermissionStatus()) {
            // se não tem permissão, apenas não notifica mas ainda marca como triggered? Não, só dispara se tiver permissão.
            // Mas precisamos evitar loops infinitos de checagem.
        }
        const now = Date.now();
        let changed = false;
        for (let i = 0; i < scheduledNotifications.length; i++) {
            const n = scheduledNotifications[i];
            if (!n.triggered && n.timestamp <= now) {
                // Disparar notificação
                const fired = fireNotification(n.title, n.message, n.id);
                n.triggered = true;
                changed = true;
                if (fired) {
                    showToast(`🔔 Notificação enviada: ${n.title}`, 2000);
                } else {
                    showToast(`⚠️ Não foi possível notificar: ${n.title} (permissão?)`, 2500);
                }
            }
        }
        if (changed) {
            saveToLocalStorage();
            renderNotifications();
            updateCounter();
        }
    }

    // Adicionar nova notificação agendada
    function addNotification(title, message, dateStr, timeStr) {
        if (!title.trim()) {
            showToast("❌ Digite um título.");
            return false;
        }
        if (!message.trim()) {
            showToast("❌ Digite uma mensagem.");
            return false;
        }
        if (!dateStr || !timeStr) {
            showToast("📅 Selecione data e hora.");
            return false;
        }
        // Montar timestamp local (interpretar como data/hora no fuso do navegador)
        const dateTimeStr = `${dateStr}T${timeStr}:00`;
        const targetDate = new Date(dateTimeStr);
        if (isNaN(targetDate.getTime())) {
            showToast("Data/hora inválida.");
            return false;
        }
        const now = new Date();
        if (targetDate <= now) {
            showToast("⏳ A data/hora deve ser futura! Escolha um horário posterior.");
            return false;
        }
        const timestamp = targetDate.getTime();
        const newId = Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        const newNotif = {
            id: newId,
            title: title.trim(),
            message: message.trim(),
            timestamp: timestamp,
            triggered: false
        };
        scheduledNotifications.push(newNotif);
        // ordenar por timestamp (mais próximo primeiro)
        scheduledNotifications.sort((a,b) => a.timestamp - b.timestamp);
        saveToLocalStorage();
        renderNotifications();
        updateCounter();
        showToast(`✅ Notificação agendada para ${targetDate.toLocaleString()}`, 3000);
        // Limpar campos (opcional)
        titleInput.value = '';
        msgInput.value = '';
        // manter data e hora? deixamos como estão, mas pode resetar opcionalmente
        return true;
    }

    // Deletar notificação
    function deleteNotification(id) {
        scheduledNotifications = scheduledNotifications.filter(n => n.id !== id);
        saveToLocalStorage();
        renderNotifications();
        updateCounter();
        showToast("🗑️ Lembrete removido", 1500);
    }

    // Renderizar a lista de notificações
    function renderNotifications() {
        if (!notifListDiv) return;
        const activeNotifs = scheduledNotifications.filter(n => !n.triggered);
        const expiredNotifs = scheduledNotifications.filter(n => n.triggered);
        
        if (scheduledNotifications.length === 0) {
            notifListDiv.innerHTML = `<div class="empty-state">📭 Nenhum lembrete programado.<br>Crie um acima!</div>`;
            return;
        }
        
        let html = '';
        // Mostrar primeiro os ativos (não disparados)
        if (activeNotifs.length > 0) {
            activeNotifs.forEach(notif => {
                const dateObj = new Date(notif.timestamp);
                const formatted = dateObj.toLocaleString();
                html += `
                    <div class="notif-item">
                        <div class="notif-title">
                            <span>🔔 ${escapeHtml(notif.title)}</span>
                            <button class="delete-btn" data-id="${notif.id}" aria-label="Excluir">✖️</button>
                        </div>
                        <div class="notif-msg">${escapeHtml(notif.message)}</div>
                        <div class="notif-time">⏱️ ${formatted}</div>
                    </div>
                `;
            });
        }
        // Mostrar já disparados (histórico)
        if (expiredNotifs.length > 0) {
            html += `<div style="margin-top: 12px; font-size:0.75rem; color:#64748b; padding-left: 8px;">🔔 Já enviados:</div>`;
            expiredNotifs.forEach(notif => {
                const dateObj = new Date(notif.timestamp);
                const formatted = dateObj.toLocaleString();
                html += `
                    <div class="notif-item expired">
                        <div class="notif-title">
                            <span>✅ ${escapeHtml(notif.title)}</span>
                            <button class="delete-btn" data-id="${notif.id}" aria-label="Excluir">🗑️</button>
                        </div>
                        <div class="notif-msg">${escapeHtml(notif.message)}</div>
                        <div class="notif-time">⏱️ ${formatted} <span class="notif-status">(enviado)</span></div>
                    </div>
                `;
            });
        }
        
        notifListDiv.innerHTML = html;
        
        // Atachar eventos de delete aos botões
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (id) deleteNotification(id);
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    function updateCounter() {
        const count = scheduledNotifications.filter(n => !n.triggered).length;
        if (counterBadge) counterBadge.innerText = count;
    }
    
    // Inicializar data/hora default (próximo horário útil)
    function setDefaultDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes() + 2).padStart(2, '0'); // +2 min padrão
        let finalMinutes = parseInt(minutes);
        let finalHours = parseInt(hours);
        if (finalMinutes >= 60) {
            finalMinutes -= 60;
            finalHours += 1;
        }
        if (finalHours >= 24) finalHours = 0;
        const defaultDate = `${year}-${month}-${day}`;
        const defaultTime = `${String(finalHours).padStart(2,'0')}:${String(finalMinutes).padStart(2,'0')}`;
        if (dateInput) dateInput.value = defaultDate;
        if (timeInput) timeInput.value = defaultTime;
    }
    
    // Iniciar verificador periódico (a cada 30 segundos para ser responsivo)
    function startChecker() {
        if (intervalChecker) clearInterval(intervalChecker);
        // Verificar imediatamente ao carregar
        checkPendingNotifications();
        intervalChecker = setInterval(() => {
            checkPendingNotifications();
        }, 30000); // 30 segundos
        // adicionalmente, também verificar a cada mudança de visibilidade da página
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                checkPendingNotifications();
            }
        });
    }
    
    // Eventos e inicialização
    function init() {
        loadFromLocalStorage();
        setDefaultDateTime();
        updatePermissionStatus();
        startChecker();
        
        // Botão agendar
        scheduleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const title = titleInput.value;
            const msg = msgInput.value;
            const dateVal = dateInput.value;
            const timeVal = timeInput.value;
            addNotification(title, msg, dateVal, timeVal);
        });
        
        // Botão permissão
        testPermBtn.addEventListener('click', async () => {
            const granted = await rKaNCgLvMEXxNzMxj2F7FYi1AdRrTo6Nhu();
            if (granted) {
                // Notificação de teste
                fireNotification('✅ Notificações ativas', 'Você receberá lembretes na hora certa!', 'test');
            }
        });
        
        // Ao modificar permissão por ação externa, atualizar flag
        window.addEventListener('load', () => {
            updatePermissionStatus();
            // Garantir que quando a página carregar verifique se alguma notificação ficou pendente enquanto estava fechado
            checkPendingNotifications();
        });
        
        // Para evitar muitos eventos, tudo ok
    }
    
    init();
</script>
</body>
</html>
